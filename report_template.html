<html>

<head>
    <title>%title% word counrt report</title>
    <style>
        body {
            background: lightblue;
        }

        #header {
            text-align: center;
            padding: 20px;
        }

        #title {
            font-size: 35px;
        }

        #date {
            font-size: 30px;
        }

        #word-count-table {
            margin-left: auto;
            margin-right: auto;
            font-size: 20px;
            border-collapse: collapse;
        }

        #total {
            font-weight: bold;
            background-color: lightgray;
        }

        th,
        td {
            padding: 2px;
            border: 1px solid black;
        }

        th {
            background-color: lightgray;
        }
    </style>

</head>

<body>
    <div id="header">
        <div id="title">%title%<br><em>Word Count Report</em></div>
        <div id="date">%date%</div>
    </div>
    <table id="word-count-table">
        <tr>
            <!--When a header is clicked, run the sortTable function, with a parameter, 0 for sorting by names, 1 for sorting by country:-->
            <th onclick="sortTable(0)">Name</th>
            <th>File</th>
            <th onclick="sortTable(2)">Country</th>
        </tr>
    </table>

    <script>
        /**
		 * based on:
         * https://www.w3schools.com/howto/tryit.asp?filename=tryhow_js_sort_table_desc
         * https://www.w3schools.com/howto/howto_js_sort_table.asp
         */
        function parse_num(num) {
            var parsed = parseFloat(num.replace(/,/g, ''));
            return parsed;
        }

        function sort_str(a, b, dir) {
            if (dir == "asc") {
                if (a.innerHTML.toLowerCase() > b.innerHTML.toLowerCase()) {
                    return true;
                }
            } else if (dir == "desc") {
                if (a.innerHTML.toLowerCase() < b.innerHTML.toLowerCase()) {
                    return true;
                }
            }
            return false;

        }

        function sort_wc(a, b, dir) {
            if (dir == "asc") {
                if (parse_num(a.innerHTML) > parse_num(b.innerHTML)) {
                    return true;
                }
            } else if (dir == "desc") {
                if (parse_num(a.innerHTML) < parse_num(b.innerHTML)) {
                    return true;
                }
            }
            return false;
        }

        function sortTable(n) {
            var table, rows, switching, i, x, y, shouldSwitch, dir, switchcount = 0;
            table = document.getElementById("word-count-table");
            switching = true;
            //Set the sorting direction to ascending:
            dir = "asc";
            /*Make a loop that will continue until
            no switching has been done:*/
            while (switching) {
                //start by saying: no switching is done:
                switching = false;
                rows = table.rows;
                /*Loop through all table rows (except the
                first, which contains table headers):*/
                for (i = 1; i < (rows.length - 2); i++) {
                    //start by saying there should be no switching:
                    shouldSwitch = false;
                    /*Get the two elements you want to compare,
                    one from current row and one from the next:*/
                    x = rows[i].getElementsByTagName("td")[n];
                    y = rows[i + 1].getElementsByTagName("td")[n];
                    /*check if the two rows should switch place,
                    based on the direction, asc or desc:*/
                    if (n == 0) {
                        shouldSwitch = sort_str(x, y, dir);
                    } else if (n == 2) {
                        shouldSwitch = sort_wc(x, y, dir);
                    }
                    if (shouldSwitch) {
                        break;
                    }
                }
                if (shouldSwitch) {
                    /*If a switch has been marked, make the switch
                    and mark that a switch has been done:*/
                    rows[i].parentNode.insertBefore(rows[i + 1], rows[i]);
                    switching = true;
                    //Each time a switch is done, increase this count by 1:
                    switchcount++;
                } else {
                    /*If no switching has been done AND the direction is "asc",
                    set the direction to "desc" and run the while loop again.*/
                    if (switchcount == 0 && dir == "asc") {
                        dir = "desc";
                        switching = true;
                    }
                }
            }
        }
    </script>
</body>

</html>
