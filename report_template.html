<html>

<head>
    <title>%title% word counrt report</title>
    <style>
        body {
            background: lightblue;
        }

        #header {
            text-align: center;
            padding: 20px;
        }

        #title {
            font-size: 35px;
        }

        #date {
            font-size: 30px;
        }

        #word-count-table {
            margin-left: auto;
            margin-right: auto;
            font-size: 20px;
            border-collapse: collapse;
        }

        #total {
            font-weight: bold;
            background-color: lightgray;
        }

        th,
        td {
            padding: 2px;
            border: 1px solid black;
        }

        th {
            background-color: lightgray;
        }
    </style>

</head>

<body>
    <div id="header">
        <div id="title">%title%<br><em>Word Count Report</em></div>
        <div id="date">%date%</div>
    </div>
    <table id="word-count-table">
    </table>
</body>

</html>
